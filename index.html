<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Path</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Lugrasimo&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
<body>
  <header>
    <h1>Choose Your Path</h1>
    <p>The journey ahead is long and treacherous. What path will you choose to guide your actions?</p>
  </header>
  <main>
    <section class="options">
      <div class="path warrior">
        <img src="path2/assetsword2.png" alt="path of the warrior sword">
      </div>
      <div class="path sorcerer">
        <img src="path2/assetstaff2.png" alt="path of the sorcerer staff">
      </div>
      <div class="path guardian">
        <img src="path2/assetshield2.png" alt="path of the guardian shield">
      </div>
    </section>
    <section class="giveup">
      <button class="btn">Give up?</btn>
    </section>
  </main>
  <footer> Designed by Aubrey Smith | Web Design 1 Spring 2026</footer>
  </body>
</html>
